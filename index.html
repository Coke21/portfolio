<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Artur's Portfolio</title>
    <script>
        //Automatically set base href depending on environment (local vs prod)
        const baseElement = document.createElement('base');
        const isDevelopment = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        baseElement.href = isDevelopment ? '/' : '/portfolio/';
        document.head.appendChild(baseElement);
    </script>

    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />

    <link href="manifest.webmanifest" rel="manifest" />
    <link href="icons/folderopen.png" rel="icon" />
    <link rel="apple-touch-icon" sizes="512x512" href="icons/folderopen.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icons/folderopen.png" />

    <link href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" rel="stylesheet">
    <script type="importmap"></script>

    <link href="css/main.css" rel="stylesheet" />
</head>

<body class="loading">
    <div id="app" />

    <div style="position:absolute; top:30vh; width:100%; text-align:center;">
        <h1 style="font-size: 40px; font-weight: bold">Artur's Portfolio</h1>
        <p style="font-size: 30px">
            <i class="fas fa-spinner fa-pulse"></i> The portfolio is loading...
        </p>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js', { updateViaCache: 'none' });</script>
    <script src="_content/Blazor-Analytics/blazor-analytics.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script>
        window.addEventListener('load', () => {
            document.body.classList.remove('loading');
        });
    </script>
</body>

</html>
